name: Generate ASCII Artwork

on: push

jobs:
  build_job_1:
    runs-on: ubuntu-latest
    steps:
      - name: Install Cowsay Program
        run: sudo apt-get install cowsay -y

      - name: Executing Cowsay Command
        run: cowsay -f dragon "Run for cover, I am a DRAGON....RAWR" >> dragon.txt

      - name: Sleep for 3 Seconds
        run: sleep 3

  test_job_2:
    runs-on: ubuntu-latest
    needs: build_job_1
    steps:
      - name: Sleep for 4 Seconds
        run: sleep 4

      - name: Test File Exists
        run: grep -i "dragon" dragon.txt

  deploy_job_3:
    runs-on: ubuntu-latest
    needs: test_job_2
    steps:
      - name: Read File
        run: cat dragon.txt

      - name: Deploy
        run: echo "Deploying ASCII Art to Production Server..."
